<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💑 신혼여행 튀르키예 플래너</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💑</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="허니문 플래너" />
  <meta name="theme-color" content="#1a6e8a" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="hd-left">
    <div class="hd-logo">💑</div>
    <div class="hd-title">
      <h1>신혼여행 튀르키예 플래너</h1>
      <p>ISTANBUL · CAPPADOCIA · ANTALYA &nbsp;·&nbsp; JULY 2026</p>
    </div>
  </div>
  <div class="hd-right">
    <button class="notes-open-btn" id="notesBtn" title="메모">📋</button>
    <div class="hd-hotels">
      <div class="hotel-chip">
        <strong>🕌 Elysium Taksim</strong>
        7/1–7/5 · 이스탄불
      </div>
      <div class="hotel-chip">
        <strong>🎈 Lord of Cappadocia</strong>
        7/5–7/7 · 카파도키아
      </div>
      <div class="hotel-chip">
        <strong>🏖️ Megasaray Westbeach</strong>
        7/7–7/11 · 안탈리아
      </div>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <!-- Day tabs -->
    <div class="tabs-wrap">
      <div class="tabs-label-row">
        <div class="tabs-label">날짜 선택</div>
        <button class="tabs-notes-btn" id="tabsNotesBtn" title="여행 메모">📋 메모</button>
      </div>
      <div class="tabs-scroller">
        <button class="tabs-arrow" id="tabsLeft" title="이전">&#8249;</button>
        <div class="tabs-row" id="dayTabs"></div>
        <button class="tabs-arrow" id="tabsRight" title="다음">&#8250;</button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap" id="searchWrap">
      <div class="search-header">
        <button class="search-back-btn" id="searchBackBtn" title="닫기">←</button>
        <span class="search-header-label">📍 장소 검색 (튀르키예)</span>
        <span class="search-day-tag" id="searchDayTag">Day 1에 추가</span>
      </div>
      <div class="search-row">
        <input
          id="searchInput"
          type="text"
          class="search-input"
          placeholder="예: 그랜드 바자르, 아야소피아, Göreme..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-clear" id="searchClear" title="지우기">✕</button>
      </div>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <!-- Itinerary -->
    <div class="itin-wrap" id="itinWrap"></div>

  </div>

  <!-- 모바일 드래그 리사이즈 핸들 (사이드바 밖에 위치) -->
  <button class="sidebar-toggle" id="sidebarToggle" title="드래그해서 크기 조절">
    <span class="sidebar-toggle-icon"></span>
  </button>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-btns">
      <button class="map-btn" id="overviewBtn">🗺️ 전체 여행 경로</button>
      <button class="map-btn" id="fitDayBtn">📍 오늘 일정 보기</button>
    </div>
  </div>
</div>



<!-- 메모 패널 -->
<div class="notes-panel" id="notesPanel">
  <div class="notes-panel-box">
    <div class="notes-panel-header">
      <span class="notes-panel-title">📋 여행 메모</span>
      <button class="notes-panel-close" id="notesPanelClose">✕</button>
    </div>
    <div class="notes-tabs" id="notesTabs"></div>
    <textarea class="notes-textarea" id="notesTextarea"></textarea>
    <div class="notes-transport-guide" id="notesTransportGuide" style="display:none"></div>
  </div>
</div>

<!-- 모바일 전용 검색 모달 (DOM 최상단 독립 요소) -->
<div id="mobileModal" class="mobile-modal">
  <div class="mm-header">
    <button class="mm-back" id="mmBack">←</button>
    <input class="mm-input" id="mmInput" type="text"
           placeholder="예: 아야소피아, 그랜드 바자르..."
           autocomplete="off" spellcheck="false" />
    <button class="mm-clear" id="mmClear">✕</button>
  </div>
  <div class="mm-day-tag" id="mmDayTag">Day 1에 추가</div>
  <div class="mm-results" id="mmResults"></div>
</div>

<!-- 지도 장소 정보 카드 -->
<div id="placeCard" class="place-card">
  <div class="place-card-drag"></div>
  <button class="place-card-close" id="placeCardClose">✕</button>

  <!-- 사진 영역 -->
  <div class="place-card-photo-wrap" id="placeCardPhotoWrap">
    <div class="place-card-photo-skeleton" id="placeCardPhotoSkeleton">📷</div>
    <img class="place-card-photo-img" id="placeCardImg" src="" alt="" />
  </div>

  <div class="place-card-body">
    <div class="place-card-name-row">
      <span class="place-card-icon" id="placeCardIcon"></span>
      <span class="place-card-name" id="placeCardName"></span>
    </div>
    <div class="place-card-meta" id="placeCardMeta"></div>
    <div class="place-card-addr" id="placeCardAddr"></div>
    <div class="place-card-rating" id="placeCardRating" style="display:none"></div>
    <!-- 설명 영역 -->
    <div class="place-card-desc" id="placeCardDesc"></div>
    <div class="place-card-desc-src" id="placeCardDescSrc"></div>
  </div>

  <div class="place-card-actions">
    <button class="place-card-del" id="placeCardDel">🗑️ 일정에서 제거</button>
    <a class="place-card-gmap" id="placeCardGmap" target="_blank">🗺️ 구글맵에서 보기</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/HoneyMoon/sw.js');
  }
</script>
</body>
</html>
