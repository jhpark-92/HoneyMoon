<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💑 신혼여행 튀르키예 플래너</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/MaruBuri/MaruBuri.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="hd-left">
    <div class="hd-logo">💑</div>
    <div class="hd-title">
      <h1>신혼여행 튀르키예 플래너</h1>
      <p>ISTANBUL · CAPPADOCIA · ANTALYA &nbsp;·&nbsp; JULY 2025</p>
    </div>
  </div>
  <button class="qr-btn" id="settingsBtn" title="동기화 설정">⚙️</button>

  <div class="hd-hotels">
    <div class="hotel-chip">
      <strong>🕌 Elysium Taksim</strong>
      7/1–7/5 · 이스탄불
    </div>
    <div class="hotel-chip">
      <strong>🎈 Lord of Cappadocia</strong>
      7/5–7/7 · 카파도키아
    </div>
    <div class="hotel-chip">
      <strong>🏖️ Megasaray Westbeach</strong>
      7/7–7/11 · 안탈리아
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <!-- Day tabs -->
    <div class="tabs-wrap">
      <div class="tabs-label">날짜 선택</div>
      <div class="tabs-scroller">
        <button class="tabs-arrow" id="tabsLeft" title="이전">&#8249;</button>
        <div class="tabs-row" id="dayTabs"></div>
        <button class="tabs-arrow" id="tabsRight" title="다음">&#8250;</button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap" id="searchWrap">
      <div class="search-header">
        <span class="search-header-label">📍 장소 검색 (튀르키예)</span>
        <span class="search-day-tag" id="searchDayTag">Day 1에 추가</span>
      </div>
      <div class="search-row">
        <input
          id="searchInput"
          type="text"
          class="search-input"
          placeholder="예: 그랜드 바자르, 아야소피아, Göreme..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-clear" id="searchClear" title="지우기">✕</button>
      </div>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <!-- Itinerary -->
    <div class="itin-wrap" id="itinWrap"></div>

    <!-- 모바일 접기/펼치기 핸들 -->
    <button class="sidebar-toggle" id="sidebarToggle" title="사이드바 접기/펼치기">
      <span class="sidebar-toggle-icon">▼</span>
    </button>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-btns">
      <button class="map-btn" id="overviewBtn">🗺️ 전체 여행 경로</button>
      <button class="map-btn" id="fitDayBtn">📍 오늘 일정 보기</button>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="qr-modal" id="settingsModal">
  <div class="qr-modal-box" style="max-width:360px">
    <button class="qr-modal-close" id="settingsModalClose">✕</button>
    <p class="qr-modal-title">⚙️ 동기화 설정</p>
    <p class="qr-modal-desc" style="text-align:left;margin-bottom:14px">
      Google Apps Script URL을 입력하면<br>
      구글 드라이브에 자동으로 저장돼요.<br>
      <a href="https://github.com/jhpark-92/HoneyMoon/blob/main/appscript.gs" target="_blank" style="color:var(--primary);font-size:0.72rem">📄 설정 방법 보기</a>
    </p>
    <input
      id="scriptUrlInput"
      type="url"
      placeholder="https://script.google.com/macros/s/..."
      style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:0.8rem;outline:none;margin-bottom:10px"
    />
    <div style="display:flex;gap:8px">
      <button id="scriptUrlSave" style="flex:1;padding:9px;background:var(--primary);color:white;border:none;border-radius:9px;font-family:inherit;font-weight:700;cursor:pointer;font-size:0.82rem">저장</button>
      <button id="scriptUrlClear" style="padding:9px 14px;background:#f5f0e8;color:var(--text-mid);border:none;border-radius:9px;font-family:inherit;cursor:pointer;font-size:0.82rem">초기화</button>
    </div>
    <p id="syncStatus" style="margin-top:10px;font-size:0.72rem;color:var(--text-light);text-align:center"></p>
  </div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
